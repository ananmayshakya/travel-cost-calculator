services:
  - type: web
    name: travel-cost-calculator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: FUEL_SOURCE
        sync: false
      - key: FUEL_PRICE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
